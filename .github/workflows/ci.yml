# Continuous Integration for Ekorbia.
#
# Three job tracks:
#   • macOS  (test-macos)   — the primary platform: cargo fmt --check,
#                              clippy, cargo test --lib, license drift,
#                              Node helper tests, Playwright WebKit smokes.
#   • Linux  (test-linux)   — cross-platform port (Phase L0): cargo fmt
#                              --check, clippy, cargo test --lib. No UI
#                              tests on Linux — Playwright's WebKit
#                              targets WebKit upstream (same as macOS)
#                              so duplicating that suite on a Linux
#                              runner is pure spend with no extra
#                              signal. The system-level WebKitGTK that
#                              actually drives the Tauri webview on
#                              Linux only matters at runtime.
#   • Windows (test-windows) — cross-platform port (Phase W0): cargo
#                              fmt --check, clippy, cargo test --lib.
#                              Same rationale as Linux for skipping the
#                              UI suite.
#
# Plus a license-attribution drift check via cargo-about (macOS job
# only — license output is platform-independent so once is enough).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older in-flight runs on the same ref when a new commit arrives.
# Saves runner-minutes on rapid push-push-push cycles. We don't cancel
# pushes to main — every commit's CI status should be visible historically
# on the commits page, even if you push three commits in quick succession.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ── macOS: the full suite (Rust + license + UI) ───────────────────────
  test-macos:
    name: Build + test (macOS)
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Node 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      # Swatinem/rust-cache handles invalidation correctly — Cargo.lock
      # changes, target-triple changes, and toolchain bumps all bust the
      # cache automatically, so cached builds never get stale crates.
      # First run is ~15–20 min cold; subsequent runs land around 3–5 min.
      - name: Cache Cargo build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Fast style gate — fails in seconds without compiling, so a fmt
      # regression surfaces before the multi-minute clippy build.
      - name: Cargo fmt (style gate)
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Clippy (lint gate)
        working-directory: src-tauri
        run: cargo clippy --lib --all-targets -- -D warnings

      - name: Cargo unit tests
        working-directory: src-tauri
        run: cargo test --lib

      # cargo-about validates that every crate's license is on the accept
      # list in src-tauri/about.toml. A new dependency with an unaccepted
      # license (e.g. GPL-3.0) fails this step. We pipe the JSON output
      # to /dev/null because we only care about the exit code here —
      # THIRD_PARTY_LICENSES.md is regenerated manually when deps change.
      #
      # We compile cargo-about from source rather than use taiki-e/install-
      # action's prebuilt binary because the latter started silently
      # failing on macos-latest runners in mid-2026 — the action reports
      # success but the `cargo-about` binary doesn't end up on PATH, so
      # the next step explodes with "no such command: about". `cargo
      # install --locked` always works and the build artifacts are cached
      # by Swatinem/rust-cache above, so it's a ~5s no-op on warm runs.
      # On a cold cache it adds ~3 min, an acceptable cost for reliability.
      - name: Install cargo-about (from source)
        run: cargo install cargo-about --locked --version '~0.6'

      - name: License attribution drift check
        working-directory: src-tauri
        run: cargo about generate --format json > /dev/null

      - name: Install npm dependencies (Playwright runner)
        run: npm ci

      # The UI test script uses Playwright with the WebKit browser (mirrors
      # macOS Safari). `--with-deps` is a no-op on macOS but harmless;
      # included for symmetry with the Linux convention.
      - name: Install Playwright WebKit
        run: npx playwright install --with-deps webkit

      - name: UI test suite (Node + Playwright)
        run: ./scripts/run-ui-tests.sh

  # ── Linux: prove the codebase compiles + tests pass on Ubuntu ─────────
  #
  # Ubuntu 22.04 (not -latest) to pin glibc — AppImages built on a newer
  # glibc fail to launch on older user systems. 22.04 is the oldest LTS
  # still in standard support during 2026, so binaries built here run
  # essentially everywhere modern.
  test-linux:
    name: Build + test (Linux)
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # Tauri v2 prerequisites for Linux. WebKitGTK 4.1 is the webview
      # backend the Tauri runtime links against; without it the `tauri`
      # crate's build script aborts the build. The rest are runtime/icon
      # dependencies the bundler step needs, included here so cargo
      # check/test don't surface a "missing libfoo" surprise later when
      # the release workflow runs against the same toolchain.
      #
      # Versions match https://v2.tauri.app/start/prerequisites/#linux
      # for the 2.x line. If Tauri bumps to 5.x WebKitGTK in a future
      # major, update here and in release.yml together.
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cache Cargo build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cargo fmt (style gate)
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Clippy (lint gate)
        working-directory: src-tauri
        run: cargo clippy --lib --all-targets -- -D warnings

      - name: Cargo unit tests
        working-directory: src-tauri
        run: cargo test --lib

  # ── Windows: prove the codebase compiles + tests pass on Win MSVC ─────
  #
  # The Tauri runtime on Windows uses WebView2, which is preinstalled on
  # GitHub's windows-latest runners (and on Windows 11 by default for end
  # users; Win10 may need the bootstrapper — handled in release.yml).
  # No special system packages are needed for the Rust-side build.
  test-windows:
    name: Build + test (Windows)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cargo fmt (style gate)
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Clippy (lint gate)
        working-directory: src-tauri
        run: cargo clippy --lib --all-targets -- -D warnings

      - name: Cargo unit tests
        working-directory: src-tauri
        run: cargo test --lib

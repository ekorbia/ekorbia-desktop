# Release pipeline for Ekorbia.
#
# Fires when a tag matching `v*` is pushed (e.g. `v0.1.0`, `v0.1.1`).
# Builds three OS bundles in parallel and publishes one GitHub Release
# with all assets attached:
#
#   • macOS   — .dmg (aarch64-apple-darwin, unsigned)
#   • Linux   — .deb + .AppImage (x86_64-unknown-linux-gnu)
#   • Windows — .msi + .exe (NSIS, x86_64-pc-windows-msvc, unsigned)
#
# Pipeline shape:
#
#   1. create-release  — extracts CHANGELOG notes, creates a DRAFT
#                        GitHub Release for the tag, outputs its id.
#   2. build (matrix)  — three parallel jobs, one per OS. Each runs
#                        `cargo tauri build` via tauri-action and
#                        uploads its bundles to the draft release.
#   3. publish-release — once all three builds succeed, downloads
#                        every uploaded asset, generates a unified
#                        SHA256SUMS.txt, uploads the sums file, then
#                        flips the draft to published.
#
# Manual release recipe:
#   1. Edit CHANGELOG.md — move [Unreleased] content into a new
#      [0.x.y] section dated today.
#   2. Bump version in src-tauri/Cargo.toml, src-tauri/tauri.conf.json
#      (keep them in sync).
#   3. git commit -am "Prep 0.x.y release"
#   4. git tag v0.x.y
#   5. git push origin main && git push origin v0.x.y
#
# About 20 minutes later, github.com/ekorbia/ekorbia-desktop/releases
# gets a new published entry with all bundles + SHA256SUMS.txt attached.
#
# Notes:
# - All builds are UNSIGNED. macOS users hit Gatekeeper, Windows users
#   hit SmartScreen, Linux users may need to chmod +x the AppImage.
#   Each is documented in README.md.
# - Linux builds run on ubuntu-22.04 (not -latest) to pin glibc — an
#   AppImage built on a newer glibc fails to launch on older user
#   systems. 22.04 is the oldest LTS still in support, so binaries
#   built here run on essentially every modern distro.

name: Release

on:
  push:
    tags:
      - 'v*'

# If someone force-pushes the same tag to fix a typo before the first
# build finishes, cancel the older run rather than racing two release
# uploads.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Stage 1: create the draft release with CHANGELOG notes ─────────────
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.result }}
      version: ${{ steps.notes.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extracting CHANGELOG section for [$VERSION]"
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "^## \\[" ver "\\]") { found=1; next }
            }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::error::No CHANGELOG.md section found for [$VERSION]. Add a '## [$VERSION] - YYYY-MM-DD' entry before tagging."
            exit 1
          fi
          echo "--- Release notes preview ---"
          cat RELEASE_NOTES.md

      - name: Create draft GitHub Release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('RELEASE_NOTES.md', 'utf8');
            const tag = context.ref.replace('refs/tags/', '');
            // Semver prerelease tags always contain a `-` (v0.3.0-rc1,
            // v0.3.0-beta.2, etc.). Flag those as GitHub pre-releases
            // so they don't show as "Latest" on the Releases page.
            const isPrerelease = tag.includes('-');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Ekorbia ${tag}`,
              body,
              draft: true,
              prerelease: isPrerelease,
            });
            return data.id;
          result-encoding: string

  # ── Stage 2: build on each OS, upload assets to the draft ──────────────
  build:
    name: Build (${{ matrix.label }})
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            label: macOS
            # aarch64-apple-darwin native. Intel Mac users run under
            # Rosetta 2; documented in README.
            args: ''
          - platform: ubuntu-22.04
            label: Linux
            args: ''
          - platform: windows-latest
            label: Windows
            args: ''
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      # Linux-only system deps. Mirrors ci.yml's test-linux job — keep
      # these in sync when bumping Tauri or its WebKitGTK dependency.
      #
      # `rpm` provides rpmbuild, which Tauri's RPM bundler shells out to.
      # Without it, the rpm target silently no-ops (or the bundler errors,
      # depending on the Tauri patch version). Listed only in the release
      # workflow because ci.yml's Linux job doesn't produce bundles —
      # adding rpm there would just slow down `cargo test --lib`.
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          # See ci.yml for why: the hosted ubuntu-22.04 image preconfigures
          # Microsoft's APT repos, which intermittently 403 and break the whole
          # `apt-get update`. We need nothing from them — drop any source file
          # referencing that host before updating.
          sudo find /etc/apt/sources.list.d -type f \
            -exec grep -q 'packages\.microsoft\.com' {} \; -print -delete
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Cache Cargo build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Add the runner OS to the cache key so the three platforms
          # don't fight over a single shared cache.
          key: ${{ matrix.platform }}

      # macOS only: build the bundled engine sidecar (static llama-server
      # from a PINNED llama.cpp source release) BEFORE `cargo tauri build`
      # — tauri.macos.conf.json's externalBin requires the file and the
      # bundler copies it into Ekorbia.app/Contents/MacOS/. End users get
      # it inside the DMG; nobody builds anything client-side. The Linux
      # and Windows bundles deliberately ship WITHOUT a sidecar (engine
      # backend is macOS-first — plan Phase 6 adds their builds), which
      # is why externalBin lives in the macOS config overlay, not the
      # base tauri.conf.json. Adds ~10 min to this leg (cmake is
      # preinstalled on the hosted macOS runners; the script sha256-pins
      # its source and refuses binaries linking non-system libraries).
      - name: Build engine sidecar (llama-server)
        if: matrix.platform == 'macos-latest'
        run: ./scripts/fetch-llama-server.sh

      # tauri-action runs `cargo tauri build`, finds the bundle outputs,
      # and uploads them to the release identified by `releaseId`.
      - name: Build and upload bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  # ── Stage 3: SHA256SUMS + flip draft to published ──────────────────────
  publish-release:
    name: Publish release
    needs: [create-release, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download all release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets
          cd assets
          gh release download "${{ github.ref_name }}" --repo "${{ github.repository }}"
          ls -la

      - name: Compute SHA256SUMS
        run: |
          cd assets
          # Hash everything except a pre-existing sums file (paranoia —
          # the draft shouldn't have one yet).
          sha256sum * | grep -v 'SHA256SUMS.txt$' > SHA256SUMS.txt
          echo "--- SHA256SUMS.txt ---"
          cat SHA256SUMS.txt

      - name: Upload SHA256SUMS.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd assets
          gh release upload "${{ github.ref_name }}" SHA256SUMS.txt \
            --clobber --repo "${{ github.repository }}"

      - name: Flip draft to published
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            });
